name: Trigger ForgeaX Build

on:
  issues:
    types: [opened]

jobs:
  trigger:
    runs-on: ubuntu-latest
    if: github.event.issue.title == 'build'
    steps:
      - name: Trigger private repo build
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.PRIVATE_REPO_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "User-Agent: ForgeaX-Trigger" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"build"}' \
            https://api.github.com/repos/ForgeaXGame/forgeax-studio/dispatches

      - name: Close trigger issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
